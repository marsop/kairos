<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#311b92" />
      <stop offset="100%" stop-color="#0a0033" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe082" />
      <stop offset="50%" stop-color="#ffb300" />
      <stop offset="100%" stop-color="#ff6f00" />
    </linearGradient>
    <linearGradient id="sandGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#40c4ff" />
      <stop offset="100%" stop-color="#00b0ff" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGradient)" />
  <circle cx="256" cy="256" r="176" fill="#cda83b" />
  <circle cx="256" cy="256" r="160" fill="url(#goldGradient)" />

  <!-- The Hourglass -->
  <g transform="translate(250, 160)">
    <!-- Hourglass Frame -->
    <path d="M 0,0 L 100,0 L 100,10 L 55,75 L 100,140 L 100,150 L 0,150 L 0,140 L 45,75 L 0,10 Z" fill="#ffffff" />
    <!-- Top Sand -->
    <polygon points="15,15 85,15 65,45 35,45" fill="url(#sandGradient)" />
    <!-- Bottom Sand -->
    <polygon points="45,75 75,140 25,140" fill="url(#sandGradient)" />
    <!-- Falling Sand stream -->
    <rect x="48" y="45" width="4" height="95" fill="url(#sandGradient)" />
  </g>

  <!-- Classical Profile God (with beard and strong posture) -->
  <g fill="#151230">
    <path d="M 120,416
             C 120,290 140,240 160,200
             C 170,170 190,120 230,120
             C 260,120 280,140 280,160
             C 280,175 270,185 260,190
             C 275,200 275,215 260,220
             C 270,230 280,250 260,265
             C 240,280 210,260 200,240
             C 190,260 210,290 240,300
             C 270,310 280,310 280,325
             C 280,340 230,335 210,310
             C 210,340 240,380 300,416 Z" />
  </g>
</svg>